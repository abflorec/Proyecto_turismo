<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Reserva de pasajes y tours desde Tacna - Moquegua, Tarata, Ite, Candarave y Tour Histórico"/>
  <title>Reserva de Pasajes y Tours - Tacna</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="container">
    <header>
      <h1>Reserva tu viaje desde Tacna</h1>
      <p class="subtitle">Rutas nacionales y tours históricos</p>
    </header>

    <main>
      <form id="formReserva" aria-label="Formulario de reserva de viaje">
        
        <div class="form-group">
          <label for="nombre" class="required">Nombre completo</label>
          <input 
            type="text" 
            id="nombre" 
            name="nombre" 
            placeholder="Ej: Juan Pérez Gómez" 
            required 
            autocomplete="name"
            aria-required="true"
          >
        </div>

        <div class="form-group">
          <label for="email" class="required">Correo electrónico</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            placeholder="ejemplo@correo.com" 
            required 
            autocomplete="email"
            aria-required="true"
          >
        </div>

        <div class="form-group">
          <label for="telefono" class="required">Teléfono / WhatsApp</label>
          <input 
            type="tel" 
            id="telefono" 
            name="telefono" 
            placeholder="Ej: +51 987 654 321" 
            required 
            autocomplete="tel"
            aria-required="true"
          >
        </div>

        <div class="form-group">
          <label for="tipoBoleto" class="required">Tipo de boleto</label>
          <select id="tipoBoleto" name="tipoBoleto" required aria-required="true">
            <option value="" disabled selected>Seleccione tipo de boleto</option>
            <option value="Normal">Normal</option>
            <option value="VIP">VIP</option>
          </select>
        </div>

        <div class="form-group">
          <label for="ruta" class="required">Ruta o Tour</label>
          <select id="ruta" name="ruta" required aria-required="true">
            <option value="" disabled selected>Seleccione ruta o tour</option>
            <option value="Tacna - Moquegua">Tacna → Moquegua</option>
            <option value="Tacna - Tarata">Tacna → Tarata</option>
            <option value="Tacna - Ite">Tacna → Ite</option>
            <option value="Tacna - Candarave">Tacna → Candarave</option>
            <option value="Tour General Histórico de Tacna">Tour General Histórico de Tacna</option>
          </select>
        </div>

        <div class="form-group">
          <label for="fecha" class="required">Fecha del viaje</label>
          <input 
            type="date" 
            id="fecha" 
            name="fecha" 
            required 
            aria-required="true"
          >
          <!-- El min se establece con JavaScript más abajo -->
        </div>

        <button type="submit" id="btnSubmit">Registrar Reserva</button>

        <div id="mensaje" role="alert" aria-live="polite"></div>
      </form>
    </main>

    <footer>
      <p>© 2025 - Sistema de Reservas Tacna</p>
    </footer>
  </div>

  <script src="js/main.js"></script>

</body>
</html>
